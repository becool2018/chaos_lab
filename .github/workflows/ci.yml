name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build dashboard
        run: npm run build

  # Optional: add a job that checks out messageEngine next to this repo and runs
  # `npm run sidecar:build`. Keep engine changes in the messageEngine repository only.
