# Example: TLS terminates here; static UI + proxy /api to chaos_lab_sidecar.
# Adjust paths, server_name, and cert paths.

upstream chaos_sidecar {
    server 127.0.0.1:8787;
}

server {
    listen 443 ssl http2;
    server_name chaos-lab.example.com;

    ssl_certificate     /etc/ssl/certs/chaos-lab.crt;
    ssl_certificate_key /etc/ssl/private/chaos-lab.key;

    root /var/www/chaos-lab/dist;
    index index.html;

    location /api/ {
        proxy_pass http://chaos_sidecar;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/events {
        proxy_pass http://chaos_sidecar;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
